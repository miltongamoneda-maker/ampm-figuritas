// ===== SUPABASE AUTH =====
const SUPA_URL='https://aiknysxsjlodcrzzknbt.supabase.co';

      // Merge: if Supabase has data, use it; if empty but LS has data, upload LS data
      if(stickers.length>0){
        S.my=my;LS.s('my',my);
        console.log('Loaded',stickers.length,'stickers from Supabase');
      }else if(Object.keys(S.my).length>0){
        console.log('No Supabase stickers, uploading localStorage data...');
        await supaBulkUploadStickers(userId,S.my);
      }
    }

    // Load predictions
    const{data:preds,error:pErr}=await supaClient.from('predictions').select('match_id,home_score,away_score').eq('user_id',userId);
    if(!pErr&&preds){
      const predsMap={};
      preds.forEach(p=>{predsMap[p.match_id]={h:p.home_score,a:p.away_score}});
      if(preds.length>0){
        S.preds=predsMap;LS.s('preds',predsMap);
      }else if(Object.keys(S.preds).length>0){
        await supaBulkUploadPreds(userId,S.preds);
      }
    }

    // Load profile extras (favorite_store, avatar)
    const{data:prof,error:prErr}=await supaClient.from('profiles').select('favorite_store,avatar_data,is_admin,name,city').eq('id',userId).single();
    if(!prErr&&prof){
      if(prof.favorite_store)S.favStore=prof.favorite_store;
      if(prof.avatar_data)S.avatar=prof.avatar_data;
      if(prof.is_admin)S.isAdmin=true;
      if(prof.name&&S.user)S.user.nm=prof.name;
      if(prof.city&&S.user)S.user.ct=prof.city;
      LS.s('fav',S.favStore);LS.s('avatar',S.avatar);LS.s('adm',S.isAdmin);
    }

    // Load exchanges (all pending for the community)
    const{data:exs,error:eErr}=await supaClient.from('exchanges').select('*').eq('status','pending');
    if(!eErr&&exs&&exs.length>0){
      S.exs=exs.map(e=>({id:e.id,rid:e.requester_id,rn:e.requester_name,sid:e.store_id,st:e.status,ca:e.created_at,of:e.offered,wt:e.wanted}));
      LS.s('exs',S.exs);
    }

    R();
    console.log('Supabase data loaded successfully');
  }catch(err){console.error('Supabase load error:',err)}
}

async function supaBulkUploadStickers(userId,myMap){
  if(!supaClient||!userId)return;
  const rows=Object.entries(myMap).filter(([k,v])=>v.q>0).map(([k,v])=>({user_id:userId,sticker_id:k,quantity:v.q,for_trade:v.a||0}));
  if(rows.length===0)return;
  // Batch in chunks of 200
  for(let i=0;i<rows.length;i+=200){
    const chunk=rows.slice(i,i+200);
    const{error}=await supaClient.from('stickers').upsert(chunk,{onConflict:'user_id,sticker_id'});
    if(error)console.error('Bulk upload stickers error:',error);
  }
  console.log('Uploaded',rows.length,'stickers to Supabase');
}

async function supaBulkUploadPreds(userId,predsMap){
  if(!supaClient||!userId)return;
  const rows=Object.entries(predsMap).map(([k,v])=>({user_id:userId,match_id:k,home_score:v.h,away_score:v.a}));
  if(rows.length===0)return;
  const{error}=await supaClient.from('predictions').upsert(rows,{onConflict:'user_id,match_id'});
  if(error)console.error('Bulk upload preds error:',error);
}

// Debounced sync: saves to Supabase after 1.5 seconds of inactivity
function supaScheduleSync(what){
  if(!supaClient||!_supaUserId)return;
  _syncQueue[what]=true;
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>supaFlush(),1500);
}

async function supaFlush(){
  if(_syncing||!supaClient||!_supaUserId)return;
  _syncing=true;
  const uid=_supaUserId;
  try{
    // Sync stickers
    if(_syncQueue.stickers){
      _syncQueue.stickers=false;
      const rows=Object.entries(S.my).filter(([k,v])=>v.q>0).map(([k,v])=>({user_id:uid,sticker_id:k,quantity:v.q,for_trade:v.a||0}));
      if(rows.length>0){
        for(let i=0;i<rows.length;i+=200){
          const chunk=rows.slice(i,i+200);
          await supaClient.from('stickers').upsert(chunk,{onConflict:'user_id,sticker_id'});
        }
      }
      // Delete stickers with quantity 0
      const deleted=Object.entries(S.my).filter(([k,v])=>v.q<=0).map(([k])=>k);
      // Also delete stickers that were removed (not in S.my anymore)
      const{data:remote}=await supaClient.from('stickers').select('sticker_id').eq('user_id',uid);
      if(remote){
        const localIds=new Set(Object.keys(S.my).filter(k=>S.my[k].q>0));
        const toDelete=remote.filter(r=>!localIds.has(r.sticker_id)).map(r=>r.sticker_id);
        if(toDelete.length>0){
          for(let i=0;i<toDelete.length;i+=200){
            const chunk=toDelete.slice(i,i+200);
            await supaClient.from('stickers').delete().eq('user_id',uid).in('sticker_id',chunk);
          }
        }
      }
      console.log('Stickers synced to Supabase');
    }

    // Sync predictions
    if(_syncQueue.preds){
      _syncQueue.preds=false;
      const rows=Object.entries(S.preds).map(([k,v])=>({user_id:uid,match_id:k,home_score:v.h,away_score:v.a}));
      if(rows.length>0){
        await supaClient.from('predictions').upsert(rows,{onConflict:'user_id,match_id'});
      }
      console.log('Predictions synced to Supabase');
    }

    // Sync profile
    if(_syncQueue.profile){
      _syncQueue.profile=false;
      await supaClient.from('profiles').update({
        name:S.user?.nm||'Coleccionista',
        city:S.user?.ct||'Managua',
        favorite_store:S.favStore||null,
        avatar_data:S.avatar||null,
        is_admin:S.isAdmin||false,
        updated_at:new Date().toISOString()
      }).eq('id',uid);
      console.log('Profile synced to Supabase');
    }
  }catch(err){console.error('Supabase sync error:',err)}
  _syncing=false;
}

let _leaderboardCache=[];

const CACHE_TTL=60000; // 1 minute cache

async function fetchLeaderboard(){
  if(!supaClient)return;
  if(Date.now()-_leaderboardTs<CACHE_TTL&&_leaderboardCache.length>0)return _leaderboardCache;
  try{
    const resp=await fetch(SUPA_URL+'/rest/v1/rpc/get_leaderboard',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},body:'{}'
    });
    const data=await resp.json();
    if(Array.isArray(data)&&data.length>0){
      _leaderboardCache=data.map(u=>({
        id:u.user_id,
        nm:u.name||'Coleccionista',
        ct:u.city||'Managua',
        av:u.avatar_data,
        count:parseInt(u.sticker_count)||0,
        dups:parseInt(u.duplicate_count)||0,
        p:Math.round((parseInt(u.sticker_count)||0)/TOT*100)
      }));
      _leaderboardTs=Date.now();
      R();
    }
  }catch(e){console.warn('Leaderboard fetch error:',e)}
  return _leaderboardCache;
}

async function fetchGlobalStats(){
  if(!supaClient)return _globalStatsCache;
  if(Date.now()-_globalStatsTs<CACHE_TTL&&_globalStatsCache)return _globalStatsCache;
  try{
    const resp=await fetch(SUPA_URL+'/rest/v1/rpc/get_global_stats',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},body:'{}'
    });
    const data=await resp.json();
    if(data){
      _globalStatsCache=data;
      _globalStatsTs=Date.now();
      R();
    }
  }catch(e){console.warn('Global stats fetch error:',e)}
  return _globalStatsCache;
}

async function signInWithGoogle(){
  if(!supaClient){toast('Servicio no disponible','e');return}
  // ===== iOS NATIVE PATH (Apple-compliant via Google SDK) =====
  const isIOS = window.Capacitor && typeof window.Capacitor.getPlatform==='function' && window.Capacitor.getPlatform()==='ios';
  if(isIOS){
    try{
      const SocialLogin = window.Capacitor.Plugins && window.Capacitor.Plugins.SocialLogin;
      if(!SocialLogin){
        console.error('[GoogleSignIn] SocialLogin plugin missing');
        toast('Reabrí la app por favor','e');
        return;
      }
      // Initialize provider (idempotent — safe to call repeatedly)
      await SocialLogin.initialize({
        google:{
          iOSClientId:'13505831408-p236l9odhqrf6j3a0dqd409krufbfugm.apps.googleusercontent.com',
          iOSServerClientId:'13505831408-bb23rirr71tvv3h8oh4tu4iffc8sk7ef.apps.googleusercontent.com',
          mode:'online'
        }
      });
      // Trigger native Google Sign-In dialog (NO browser, NO web view, fully native)
      const r = await SocialLogin.login({
        provider:'google',
        options:{scopes:['email','profile']}
      });
      const idToken = r && r.result && r.result.idToken;
      if(!idToken){
        console.error('[GoogleSignIn] No idToken in response',r);
        toast('No se recibió token de Google','e');
        return;
      }
      // Pass idToken to Supabase to create/restore session
      const{error}=await supaClient.auth.signInWithIdToken({
        provider:'google',
        token:idToken
      });
      if(error){
        console.error('[GoogleSignIn] Supabase error:',error);
        toast('Error: '+error.message,'e');
      }
      return;
    }catch(e){
      console.error('[GoogleSignIn] Native exception:',e);
      const msg = (e && e.message) ? e.message : 'error';
      // User cancellation is silent
      if(/cancel/i.test(msg)){return}
      toast('Google: '+msg,'e');
      return;
    }
  }
  // ===== ANDROID NATIVE PATH (uses Browser plugin, Google Play allows this) =====
  const isAndroid = window.Capacitor && typeof window.Capacitor.getPlatform==='function' && window.Capacitor.getPlatform()==='android';
  if(isAndroid){
    const Browser = window.Capacitor.Plugins && window.Capacitor.Plugins.Browser;
    if(Browser){
      try{
        const r = await supaClient.auth.signInWithOAuth({
          provider:'google',
          options:{redirectTo:'https://ampm-figuritas.vercel.app',skipBrowserRedirect:true}
        });
        if(r && r.error){toast('Error: '+r.error.message,'e');return}
        const url = r && r.data && r.data.url;
        if(!url){toast('No se pudo iniciar Google','e');return}
        await Browser.open({url:url,presentationStyle:'popover',toolbarColor:'#003B73'});
        return;
      }catch(e){
        toast('Google no disponible: '+(e&&e.message?e.message:'error'),'e');
        return;
      }
    }
  }
  // ===== WEB PATH (browser only) =====
  const{error}=await supaClient.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
  if(error)toast('Error: '+error.message,'e');
}

function getRank(){
  const ct=S.user?.ct||'Managua';
  // Use real leaderboard from Supabase if available
  if(_leaderboardCache.length>0){
    const ranked=_leaderboardCache.map(u=>({
      ...u,
      me:u.id===_supaUserId||(S.user&&u.nm===S.user.nm)
    }));
    // If current user not in leaderboard yet, add them
    if(!ranked.some(u=>u.me)){
      ranked.push({nm:S.user?.nm||'Vos',p:stats().p,count:stats().o,me:true,ct});

let _longTimer=null;
function stickerTap(id){
  if(S.albumLocked){toast('🔒 Colección bloqueada — desbloqueá en la parte superior','i');return}
  quickAdd(id);
}
function stickerHold(id){
  if(S.albumLocked)return;
  _longTimer=setTimeout(()=>{_longTimer=null;U({sModal:ALL.find(z=>z.id===id)})},500);
}
function stickerRelease(){if(_longTimer){clearTimeout(_longTimer);_longTimer=null}}
function quickAdd(id){
  const m={...S.my};
  const cur=m[id]||{q:0,a:0};
  const nq=cur.q+1;
  const na=nq>=2?nq-1:0;
  m[id]={q:nq,a:na};
  // Log activity
  const log=LS.g('actLog',[]);
  const sk=ALL.find(x=>x.id===id);
  log.unshift({id,num:sk.num,fl:sk.fl,tn:sk.tn,t:Date.now()});
  if(log.length>20)log.length=20;
  LS.s('actLog',log);
  U({my:m});
  // Sync single sticker to Supabase immediately
  supaSaveSticker(id,nq,na);
  supaLogActivity(id,sk.num,sk.fl,sk.tn);
  if(navigator.vibrate)navigator.vibrate(nq===1?[30]:sk.star?[50,30,50,30,50]:[20,40,20]);
  bumpStreak();playSound(nq===1?(sk.star?'star':'add'):'dup');toast(nq===1?`✓ #${sk.num} ${sk.nm} agregada`:`+1 #${sk.num} ${sk.nm} → tenés ${nq} (${na} para cambio)`,'s');setTimeout(checkMilestones,500);
}
function quickRemove(id){
  const m={...S.my};const cur=m[id];if(!cur||cur.q<=0)return;
  const nq=cur.q-1;const na=nq>=2?nq-1:0;
  if(nq===0){delete m[id]}else{m[id]={q:nq,a:na}}
  U({my:m});supaSaveSticker(id,nq,na);
  const sk=ALL.find(x=>x.id===id);
  if(navigator.vibrate)navigator.vibrate([15]);
  toast(nq===0?`✕ #${sk.num} ${sk.nm} removida`:`−1 #${sk.num} → tenés ${nq}`,'i');
}

function showCelebration(msg,emoji){
  const el=document.createElement('div');el.className='celebrate-msg';
  el.innerHTML=`<div style="font-size:64px;animation:celebrate-bounce .5s ease">${emoji}</div>
  <div style="font-size:22px;font-weight:800;color:#fff;font-family:'Outfit',sans-serif;margin-top:12px;text-align:center">${msg}</div>`;
  el.onclick=()=>el.remove();document.body.appendChild(el);
  showConfetti();if(navigator.vibrate)navigator.vibrate([100,50,100,50,100]);
  setTimeout(()=>el.remove(),3000)
}
function checkMilestones(){
  const s=stats();
  // Check team completion
  TEAMS.forEach(t=>{const p=tProg(t.c);const key='cel_'+t.c;
    if(p.p===100&&!LS.g(key,false)){LS.s(key,true);playSound('complete');showCelebration('¡Completaste '+t.n+'!',t.f)}});
  // Check % milestones
  [25,50,75,100].forEach(pct=>{const key='cel_pct_'+pct;
    if(s.p>=pct&&!LS.g(key,false)){LS.s(key,true);
      if(pct===100)showCelebration('¡ÁLBUM COMPLETO!','🏆');
      else if(pct===75)showCelebration('¡75% completado!','🔥');
      else if(pct===50)showCelebration('¡Mitad completada!','⭐');
      else if(pct===25)showCelebration('¡25% completado!','💪')}});
}

// ===== GEOLOCATION =====
function detectNearestStore(){
  if(!navigator.geolocation){toast('Geolocalización no disponible','e');return}
  toast('📍 Buscando tu ubicación...','i');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    let best=null,bestDist=Infinity;
    ST.forEach(s=>{
      const d=Math.sqrt(Math.pow(lat-s.la,2)+Math.pow(lng-s.ln,2))*111;// approx km
      if(d<bestDist){bestDist=d;best=s}
    });
    if(best&&bestDist<10){
      S.nearStore=best;S.nearDist=Math.round(bestDist*10)/10;
      U({favStore:best.id});
      toast(`📍 Estás cerca de ${best.nm} (${S.nearDist}km)`,'s');
    }else{
      toast('No hay tienda AMPM cerca (>10km)','i');
    }
  },err=>{toast('No se pudo obtener ubicación','e')},{enableHighAccuracy:true,timeout:10000});
}

// ===== STREAK / RACHA =====
function getStreak(){
  const data=LS.g('streak',{count:0,lastDate:''});
  const today=new Date().toISOString().split('T')[0];
  if(data.lastDate===today)return data;
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(data.lastDate===yesterday)return{count:data.count,lastDate:data.lastDate};
  if(data.lastDate&&data.lastDate!==yesterday)return{count:0,lastDate:''};
  return data;
}
function bumpStreak(){
  const data=getStreak();
  const today=new Date().toISOString().split('T')[0];
  if(data.lastDate===today)return data;
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const newCount=data.lastDate===yesterday?data.count+1:1;
  const newData={count:newCount,lastDate:today};
  LS.s('streak',newData);
  if(newCount>1)toast('🔥 ¡Racha de '+newCount+' días!');
  return newData;
}
function rStreak(){const s=getStreak();const today=new Date().toISOString().split('T')[0];const active=s.lastDate===today;
return s.count>0?`<div class="streak-bar"><div class="streak-fire">${s.count>=7?'🔥':s.count>=3?'🔥':'✨'}</div><div style="flex:1"><div style="font-size:16px;font-weight:800;font-family:'Outfit',sans-serif">${s.count} día${s.count>1?'s':''} seguidos</div><div style="font-size:11px;opacity:.7">${active?'¡Hoy ya sumaste!':'¡Hacé algo hoy para no perderla!'}</div></div><div style="display:flex;gap:3px">${Array.from({length:7},(_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<(s.count%7||7)?'#fff':'rgba(255,255,255,.25)'}"></div>`).join('')}</div></div>`:''
}

// ===== SOUND EFFECTS =====
let _soundOn=LS.g('soundOn',true);
function toggleSound(){_soundOn=!_soundOn;LS.s('soundOn',_soundOn);toast(_soundOn?'🔊 Sonidos activados':'🔇 Sonidos desactivados','i')}
function playSound(type){
  if(!_soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    gain.gain.value=0.15;
    if(type==='add'){osc.frequency.value=880;osc.type='sine';gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);osc.start();osc.stop(ctx.currentTime+0.15)}
    else if(type==='dup'){osc.frequency.value=440;osc.type='triangle';gain.gain.setValueAtTime(0.1,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);osc.start();osc.stop(ctx.currentTime+0.2)}
    else if(type==='star'){osc.frequency.value=1200;osc.type='sine';gain.gain.setValueAtTime(0.12,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);osc.start();setTimeout(()=>{const o2=ctx.createOscillator();const g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=1600;o2.type='sine';g2.gain.value=0.12;g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o2.start();o2.stop(ctx.currentTime+0.3)},150);osc.stop(ctx.currentTime+0.4)}
    else if(type==='complete'){const notes=[523,659,784,1047];notes.forEach((f,i)=>{setTimeout(()=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.value=0.12;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3)},i*120)})}
    else if(type==='pack'){osc.frequency.value=300;osc.type='sawtooth';gain.gain.setValueAtTime(0.08,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);osc.start();osc.stop(ctx.currentTime+0.3)}
  }catch(e){}
}

${cityStores.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--g2)"><button style="width:36px;height:24px;border-radius:12px;background:${isPart(s.id)?'var(--grn)':'var(--g3)'};position:relative;transition:.3s;flex-shrink:0" onclick="togglePart('${s.id}')"><div style="width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;${isPart(s.id)?'left:14px':'left:2px'};transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></button><div style="flex:1"><div style="font-size:12px;font-weight:500;color:var(--g9)">${s.nm}</div></div></div>`).join('')}</div>`}).join('')}
</div>`:''}
${at==='teams'?`<div style="padding:0 16px"><div class="st">Definir equipos de Playoffs</div>
<p style="font-size:12px;color:var(--g5);margin-bottom:16px">Cuando se resuelvan los playoffs, seleccioná el equipo ganador para cada grupo. Las figuritas se actualizarán automáticamente.</p>
${getTBDTeams().map(t=>{
const opts=getTBDOptions(t.c);
return`<div style="background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:14px;margin-bottom:10px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><div style="font-size:13px;font-weight:600;color:var(--g9)">${t.n}</div><div style="font-size:11px;color:var(--g5)">Grupo ${t.g}</div></div><span style="font-size:20px">${t.f}</span></div>
<div style="font-size:11px;color:var(--g5);margin-bottom:6px">Posibles clasificados:</div>
<div style="display:flex;flex-wrap:wrap;gap:6px">${opts.map(o=>`<button style="padding:8px 12px;border-radius:10px;border:1px solid ${t.n===o.n?'var(--o5)':'var(--g2)'};background:${t.n===o.n?'var(--o0)':'var(--w)'};font-size:12px;font-weight:${t.n===o.n?'700':'500'};color:var(--g9);display:flex;align-items:center;gap:4px" onclick="setTBDTeam('${t.c}','${o.c}','${o.n}','${o.f}')">${o.f} ${o.n}</button>`).join('')}</div>
${t.f!=='⏳'?`<div style="margin-top:8px;padding:6px 10px;background:var(--grn0);border-radius:8px;font-size:11px;color:var(--grn);font-weight:600">✓ Definido: ${t.f} ${t.n}</div>`:''}</div>`}).join('')}
</div>`:''}
${at==='sess'?`<div style="padding:0 16px"><div class="st">Gestión de jornadas</div>
<div style="background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:16px;margin-bottom:16px"><h4 style="font-size:14px;font-weight:600;color:var(--g9);margin-bottom:12px">Crear nueva jornada</h4>
<label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Tienda</label><select id="adSt" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px;margin-bottom:10px;background:var(--w)">${ST.map(s=>`<option value="${s.id}">${s.nm}</option>`).join('')}</select>
<label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Fecha</label><input id="adDt" type="date" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px;margin-bottom:10px">
<div style="display:flex;gap:8px;margin-bottom:12px"><div style="flex:1"><label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Inicio</label><input id="adSt2" type="time" value="09:00" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px"></div><div style="flex:1"><label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Fin</label><input id="adEt" type="time" value="18:00" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px"></div></div>
<button style="width:100%;padding:12px;background:var(--b6);color:#fff;border-radius:10px;font-size:14px;font-weight:600" onclick="admAddSess()">Crear jornada</button></div>
<div class="st">Jornadas existentes (${SESS.length})</div>
${SESS.sort((a,b)=>b.dt.localeCompare(a.dt)).map(x=>{const st=ST.find(s=>s.id===x.sid);return`<div class="sess-row"><div><div style="font-size:12px;font-weight:600;color:var(--g9)">${st?.nm||x.sid}</div><div style="font-size:11px;color:var(--g5)">${x.dt} · ${x.s}–${x.e}</div></div><button style="font-size:10px;font-weight:600;padding:6px 10px;border-radius:8px;background:${x.on?'var(--grn0)':'var(--g1)'};color:${x.on?'var(--grn)':'var(--g4)'};border:1px solid ${x.on?'var(--grn)':'var(--g3)'}" onclick="admTogSess('${x.id}')">${x.on?'✓ Activa':'✕ Inactiva'}</button></div>`}).join('')}</div>`:''}
${at==='ads'?`<div style="padding:0 16px"><div class="st">Gestión de publicidad</div>
<div style="background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:16px;margin-bottom:16px">
<h4 style="font-size:14px;font-weight:600;color:var(--g9);margin-bottom:12px">Cintillo publicitario (barra inferior)</h4>
<p style="font-size:12px;color:var(--g5);margin-bottom:12px">Este banner aparece arriba de la navegación en todas las pantallas</p>
<label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Marca</label><input id="adBr" value="${S.adBanner.brand}" placeholder="Coca-Cola" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px;margin-bottom:10px">
<label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Texto del banner</label><input id="adTx" value="${S.adBanner.txt}" placeholder="Disfrutá Coca-Cola en tu AMPM" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px;margin-bottom:10px">
<label style="font-size:12px;font-weight:500;color:var(--g5);display:block;margin-bottom:4px">Link (URL)</label><input id="adLk" value="${S.adBanner.link||''}" placeholder="https://www.coca-cola.com" style="width:100%;padding:10px;border:1px solid var(--g2);border-radius:10px;font-size:13px;margin-bottom:12px">
<button style="width:100%;padding:12px;background:var(--o5);color:#fff;border-radius:10px;font-size:14px;font-weight:600" onclick="admSaveAd()">Guardar cambios</button>
<div style="margin-top:16px;padding:12px;background:var(--g1);border-radius:10px"><div style="font-size:11px;font-weight:600;color:var(--g5);margin-bottom:6px">Vista previa:</div><div class="ad-bar" style="border-radius:8px"><div style="font-size:20px">🥤</div><div class="t">${S.adBanner.txt}</div><div class="s">Publicidad</div></div></div>
</div></div>`:''}
<div style="height:20px"></div></div>`}
function admAddSess(){const sid=document.getElementById('adSt').value,dt=document.getElementById('adDt').value,s=document.getElementById('adSt2').value,e=document.getElementById('adEt').value;if(!dt){toast('Seleccioná una fecha','e');return}SESS.push({id:'ss-'+Date.now(),sid,dt,s,e,on:true});sv();U({});toast('Jornada creada')}
function admTogSess(id){SESS=SESS.map(x=>x.id===id?{...x,on:!x.on}:x);sv();U({});toast('Jornada actualizada','i')}
function admSaveAd(){const br=document.getElementById('adBr').value,tx=document.getElementById('adTx').value,lk=document.getElementById('adLk').value;U({adBanner:{brand:br,txt:tx,link:lk}});toast('Publicidad actualizada')}

// ===== BIND EVENTS =====
function bEv(){
  const as=document.getElementById('aS2');if(as){as.oninput=()=>{S.aSrch=as.value;R();setTimeout(()=>{const el=document.getElementById('aS2');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const ss=document.getElementById('stS');if(ss){ss.oninput=()=>{S.stSrch=ss.value;R();setTimeout(()=>{const el=document.getElementById('stS');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const ws=document.getElementById('wS');if(ws){ws.oninput=()=>{S.wSrch=ws.value;R();setTimeout(()=>{const el=document.getElementById('wS');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const pk=document.getElementById('pkSrch');if(pk){pk.oninput=()=>{S.packSrch=pk.value;R();setTimeout(()=>{const el=document.getElementById('pkSrch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const gn=document.getElementById('giftNumInput');if(gn){gn.oninput=()=>{S.giftNum=gn.value;S.giftQty=1;R();setTimeout(()=>{const el=document.getElementById('giftNumInput');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const rv=document.getElementById('rcvGaveInput');if(rv){rv.oninput=()=>{S.rcvGave=rv.value;R();setTimeout(()=>{const el=document.getElementById('rcvGaveInput');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
  const pi=document.getElementById('packNumInput');if(pi){pi.oninput=()=>{S.packInput=pi.value};pi.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();packAddNum();R();setTimeout(()=>{const el=document.getElementById('packNumInput');if(el){el.focus();el.value=''}},0)}}}
}
R();
// Check for existing Supabase session on page load (e.g., after OAuth redirect)
checkSupabaseSession();
// Fetch leaderboard on load (works even without login for public ranking)
setTimeout(()=>{if(supaClient)fetchLeaderboard()},1500);
</script>
</body>
</html>
